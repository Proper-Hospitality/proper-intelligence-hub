name: Refresh Dashboard Data

  on:
    schedule:
      - cron: '0 11 * * *'
    workflow_dispatch:

  jobs:
    refresh:
      runs-on: ubuntu-latest
      permissions:
        contents: write

      steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-python@v5
          with:
            python-version: '3.11'

        - name: Install dependencies
          run: pip install snowflake-connector-python cryptography

        - name: Refresh data from Snowflake
          env:
            SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
            SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
            SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
            SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
            SNOWFLAKE_DATABASE: PROPER_DW
            SNOWFLAKE_SCHEMA: DASHBOARD
          run: python connectors/export_all_properties.py

        - name: Commit and push updated data
          run: |
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/*.json
            if git diff --staged --quiet; then
              echo "No data changes detected"
            else
              git commit -m "chore: refresh dashboard data $(date -u +%Y-%m-%d)"
              git push
            fi
